name: CodeRabbit PR Review

# 1. 触发条件：既支持 PR 事件，也支持手动触发
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch: # 👈 新增：允许你在 Actions 页面手动点击运行

permissions:
  contents: read
  pull-requests: write
  issues: write # 给足权限，确保机器人能正常回帖

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run CodeRabbit Review
        # 👇 关键：改用官方维护的新版 Action
        uses: coderabbitai/coderabbitai-action@v3 
        with:
          # 👇 推荐使用 CodeRabbit 专用 Token，而不是 GitHub 自带 Token
          # 这样能避免很多权限导致的偶发报错
          github_token: ${{ secrets.CR_TOKEN }}
