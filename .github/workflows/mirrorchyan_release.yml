name: mirrorchyan_release

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
        required: false

jobs:
  mirrorchyan:
    runs-on: macos-latest
    steps:
      - uses: MirrorChyan/uploading-action@v1
        with:
          filetype: latest-release
          filename: ${{ format('MaaFgo-*-MXU', matrix.os, matrix.arch) }}
          mirrorchyan_rid: MaaFgo
          tag: ${{ inputs.tag }}
          p7zip: true

          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

          owner: xlxyvergil
          repo: MaaFgo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}
